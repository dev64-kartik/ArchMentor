[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is resolved dynamically in migrations/env.py from archmentor_api.config.

[post_write_hooks]
hooks = ruff_format, ruff_fix
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_fix.type = exec
ruff_fix.executable = ruff
ruff_fix.options = check --fix --exit-zero REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
