# LiveKit server config (dev)
# Docs: https://docs.livekit.io/home/self-hosting/deployment/

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false
  # Advertise the host-mapped loopback address to the browser. Without
  # `node_ip`, LiveKit auto-detects the container's docker-bridge IP
  # (172.18.0.x) and hands that to the browser as an ICE host
  # candidate — the browser can't route to it, ICE fails, and the
  # WebSocket connection errors out. In production, drop `node_ip`
  # and set use_external_ip: true instead.
  node_ip: 127.0.0.1

redis:
  address: redis:6379

# Keys are injected via LIVEKIT_KEYS env var in docker-compose.
# Never commit real keys to this file.

logging:
  level: info
  json: false

# Room defaults
room:
  auto_create: true
  empty_timeout: 300  # 5 min after last participant leaves
  max_participants: 4  # candidate + agent + safety margin
